<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botanixy Login</title>

<style>
:root {
    --bg: linear-gradient(135deg, #2e7d32, #81c784);
    --card: white;
    --text: #333;
    --primary: #2e7d32;
    --input-border: #ccc;
}

/* DARK MODE */
body.dark {
    --bg: linear-gradient(135deg, #0f1720, #1e293b);
    --card: #1e293b;
    --text: #e5e7eb;
    --primary: #4ade80;
    --input-border: #334155;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: 0.3s ease;
}

/* CONTAINER */
.container {
    background: var(--card);
    padding: 40px;
    border-radius: 15px;
    width: 300px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    color: var(--text);
    transition: 0.3s ease;
}

/* HEADER */
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: var(--primary);
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: transparent;
    color: var(--text);
    outline: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    opacity: 0.85;
}

/* LINK */
.link {
    text-align: center;
    margin-top: 10px;
}

.link a {
    text-decoration: none;
    color: var(--primary);
}

/* THEME BUTTON */
.theme-btn {
    margin-bottom: 10px;
    width: 100%;
    background: transparent;
    border: 1px solid var(--primary);
    color: var(--primary);
    border-radius: 8px;
    padding: 8px;
    cursor: pointer;
}

/* ========================= */
/* NAV BAR (ADDED) */
/* ========================= */
nav {
    position: absolute;
    top: 20px;
    left: 20px;
}

nav a {
    text-decoration: none;
    margin-right: 10px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 14px;
    color: white;
    background: rgba(0,0,0,0.2);
    transition: 0.3s;
}

nav a:hover {
    background: rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<!-- NAV ADDED (NEW ONLY) -->
<nav>
    <a href="homePage.html" class="nav-link">Home</a>
    <a href="plants.html" class="nav-link">Plants</a>
    <a href="careGuide.html" class="nav-link">Care</a>
    <a href="login.html" class="nav-link">Login</a>
</nav>

<div class="container">

    <button class="theme-btn" id="themeToggle">🌙 Toggle Theme</button>

    <h2>Botanixy Login</h2>

    <form>
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="link">
        <p>Don't have an account? <a href="#">Sign up</a></p>
    </div>

</div>

<script>
const toggleBtn = document.getElementById("themeToggle");

// load saved theme
const savedTheme = localStorage.getItem("theme");

if (savedTheme === "dark") {
    document.body.classList.add("dark");
    toggleBtn.textContent = "☀️ Light Mode";
}

toggleBtn.addEventListener("click", () => {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        toggleBtn.textContent = "☀️ Light Mode";
        localStorage.setItem("theme", "dark");
    } else {
        toggleBtn.textContent = "🌙 Dark Mode";
        localStorage.setItem("theme", "light");
    }
});
</script>

</body>
</html>
